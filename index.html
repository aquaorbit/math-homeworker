<!DOCTYPE html>
<html>
<head>
  <title>Math Homeworker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f4;
    }

    /* Top bar */
    .topbar {
      background: #fff;
      padding: 15px 20px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
    }

    /* Container */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card-header {
      height: 80px;
      background: #4285F4;
    }

    .card-body {
      padding: 15px;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .card-text {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="topbar">
  Math Homeworker
</div>

<div class="container">

  <div class="card" onclick="openLink('https://www.khanacademy.org')">
    <div class="card-header"></div>
    <div class="card-body">
      <div class="card-title">Khan Academy</div>
      <div class="card-text">Practice math lessons</div>
    </div>
  </div>

  <div class="card" onclick="openLink('https://www.wikipedia.org')">
    <div class="card-header" style="background:#34a853;"></div>
    <div class="card-body">
      <div class="card-title">Wikipedia</div>
      <div class="card-text">Search anything</div>
    </div>
  </div>

  <div class="card" onclick="openLink('https://www.desmos.com')">
    <div class="card-header" style="background:#fbbc05;"></div>
    <div class="card-body">
      <div class="card-title">Desmos</div>
      <div class="card-text">Graphing calculator</div>
    </div>
  </div>

  <div class="card" onclick="openLink('https://www.google.com')">
    <div class="card-header" style="background:#ea4335;"></div>
    <div class="card-body">
      <div class="card-title">Google</div>
      <div class="card-text">Search the web</div>
    </div>
  </div>

</div>

<script>
function openLink(url) {
  window.open(url, "_blank");
}
</script>

</body>
</html>
