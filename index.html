<!DOCTYPE html>
<html>
<body>

<button onclick="openWiki()">
  Open Wikipedia
</button>

<script>
function openWiki() {
    let win = window.open("about:blank", "_blank");

    let html = `
    <!DOCTYPE html>
    <html>
    <head>
        <title>Wikipedia</title>
        <style>
            html, body {
                margin: 0;
                height: 100%;
                overflow: hidden;
            }
            iframe {
                width: 100%;
                height: 100%;
                border: none;
            }
        </style>
    </head>
    <body>
        <iframe src="https://en.wikipedia.org"></iframe>
    </body>
    </html>
    `;

    win.document.open();
    win.document.write(html);
    win.document.close();
}
</script>

</body>
</html>
